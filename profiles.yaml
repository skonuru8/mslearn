# Model IDs live HERE, never in code. Bump versions by editing this file.
default_profile: openrouter

profiles:
  openrouter:
    roles:
      extraction:  {provider: openrouter,     model: "deepseek/deepseek-v4-flash"}
      synthesis:   {provider: openrouter, model: "deepseek/deepseek-v4-flash"}
      # Plan 11 Task 7 (empirical, live-verified 2026-07-03): v4-flash honors
      # reasoning.enabled=false — reasoning_tokens drops to 0, content comes
      # back immediately, and cost dropped ~4x on the probe call. Replaces
      # deepseek-chat so interactive (chat/teach/quiz) shares the same model
      # as extraction/synthesis/evals without paying for hidden reasoning.
      interactive: {provider: openrouter, model: "deepseek/deepseek-v4-flash", params: {reasoning: {enabled: false}}}
      evals:       {provider: openrouter, model: "deepseek/deepseek-v4-flash"}
      embedding:   {provider: ollama,     model: "nomic-embed-text"}

  claude-code:
    roles:
      extraction:  {provider: ollama,      model: "qwen3.5:9b"}
      synthesis:   {provider: claude_code, model: "default"}
      interactive: {provider: claude_code, model: "default"}
      evals:       {provider: claude_code, model: "default"}
      embedding:   {provider: ollama,      model: "nomic-embed-text"}

  offline:
    roles:
      extraction:  {provider: ollama, model: "qwen3.5:9b"}
      synthesis:   {provider: ollama, model: "qwen3.5:9b"}
      interactive: {provider: ollama, model: "qwen3.5:9b"}
      evals:       {provider: ollama, model: "qwen3.5:9b"}
      embedding:   {provider: ollama, model: "nomic-embed-text"}
