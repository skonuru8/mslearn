services:
  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"  # host 6380 avoids clashing with other local Redis on 6379
    # Broker only — no persistence volume on purpose; durable state lives in SQLite/Neo4j.

  neo4j:
    image: neo4j:5-community
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-learnsys}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
    volumes:
      - neo4j_data:/data

  # Throwaway instance for graph integration tests. The test fixtures WIPE
  # the database they point at, so they must never share an instance with
  # real data. tmpfs + no volume: state dies with the container.
  neo4j-test:
    image: neo4j:5-community
    profiles: ["test"]
    ports:
      - "7690:7687"
    environment:
      NEO4J_AUTH: neo4j/learnsys-test
    tmpfs:
      - /data

volumes:
  neo4j_data:
